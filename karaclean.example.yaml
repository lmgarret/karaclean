# Karaclean configuration
# Copy this file to karaclean.yaml and adjust to your needs.

# Cron schedule (required). Standard 5-field format: minute hour day month weekday.
# Examples: "0 3 * * *" (daily at 3am), "*/30 * * * *" (every 30 min)
schedule: "0 3 * * *"

# IANA timezone for the schedule. Defaults to UTC with a warning if omitted.
# Examples: "America/New_York", "Europe/London", "Asia/Tokyo"
timezone: "UTC"

# Dry-run mode: log intended actions without executing mutations.
# Can also be set via --dry-run flag or KARACLEAN_DRY_RUN=true env var.
# Precedence: flag > env > config.
dryRun: false

# Notifications: opt-in per-rule action summaries via Shoutrrr.
# Omit this entire section to disable notifications.
# Channel URLs use Shoutrrr format: https://github.com/nicholas-fedor/shoutrrr
notifications:
  channels:
    my-ntfy:
      url: "ntfy://ntfy.sh/karaclean-alerts"
    # slack-ops:
    #   url: "slack://hook:TOKEN-A/TOKEN-B/TOKEN-C@webhook"
    # telegram:
    #   url: "telegram://TOKEN@telegram?channels=CHAT_ID"
  default: my-ntfy   # Channel used when a rule has no "notify" override
  notifyOnError: true  # Send a notification when config validation fails at startup

rules:
  # Archive RSS bookmarks older than 30 days, unless favourited.
  - name: archive-old-rss
    conditions:
      olderThan: "30d"       # Duration: Nd (days), Nw (weeks), Nmo (months), Ny (years), Nh (hours)
      source: rss            # Values: rss, web, api, mobile, extension, cli, import
    unless:
      favourited: true       # Skip if bookmark is starred
    action: archive          # Values: archive, delete
    # notify: slack-ops  # Optional: send this rule's summary to a specific channel

  # Delete archived bookmarks older than 90 days, unless tagged or noted.
  - name: delete-ancient-archived
    conditions:
      olderThan: "90d"
      archived: true         # true = only archived, false = only non-archived
    unless:
      hasTag: keep-forever   # Skip if bookmark has this tag
      hasNote: true          # Skip if bookmark has a personal note
    action: delete
    dryRun: true           # Always dry-run this dangerous rule, regardless of global setting

  # Archive unfavourited bookmarks that lack the "keep" tag after 60 days.
  - name: archive-stale-untagged
    conditions:
      olderThan: "60d"
      favourited: false
      lacksTag: keep         # Match bookmarks that do NOT have this tag
    unless:
      archived: true         # Skip if already archived
    action: archive

  # Archive bookmarks in the "Read Later" list after 14 days.
  - name: archive-read-later
    conditions:
      olderThan: "14d"
      inList: "Read Later"   # Match bookmarks in this list (case-sensitive)
    unless:
      favourited: true
    action: archive

  # Safer than deleting: tag old archived bookmarks as deletion candidates so
  # you can review them in Karakeep before anything is removed.
  - name: flag-stale-for-review
    conditions:
      olderThan: "90d"
      archived: true
    unless:
      hasTag: keep-forever
      hasNote: true
    action: tag
    tag: delete-candidate    # Required for action: tag / untag

  # Pull bookmarks tagged "revisit" back out of the archive so they resurface.
  - name: resurface-flagged
    conditions:
      archived: true
      hasTag: revisit
    action: unarchive

  # Delete old RSS bookmarks, but protect bookmarks in curated lists.
  # - name: delete-old-rss-except-curated
  #   conditions:
  #     olderThan: "60d"
  #     source: rss
  #   unless:
  #     inList:                # Accept a list of names (OR -- any match protects)
  #       - "Best Articles"
  #       - "Reference"
  #   action: delete

# All conditions (AND semantics -- all must match):
#   olderThan: "Nd"         - bookmark created more than N days/weeks/months/years ago
#   source: "rss"           - bookmark ingested from this source
#   archived: true/false    - bookmark archive status
#   favourited: true/false  - bookmark favourite/star status
#   hasTag: "tag-name"      - bookmark has this exact tag (case-sensitive)
#   lacksTag: "tag-name"    - bookmark does NOT have this tag (case-sensitive)
#   inList: "name"          - bookmark belongs to this Karakeep list (or list of names, OR semantics)
#
# All exceptions (OR semantics -- any match skips the bookmark):
#   favourited: true/false  - skip if bookmark matches this star status
#   hasTag: "tag-name"      - skip if bookmark has this tag
#   hasNote: true/false     - skip if bookmark has/lacks a personal note
#   archived: true/false    - skip if bookmark matches this archive status
#   inList: "name"          - skip if bookmark belongs to this list (or list of names)
#
# Actions (the "action" field; only "delete" is irreversible):
#   archive     - set archived: true via Karakeep API
#   unarchive   - set archived: false via Karakeep API
#   delete      - permanently remove via Karakeep API
#   tag         - attach a tag (requires "tag"); created if it doesn't exist
#   untag       - detach a tag (requires "tag")
#   favourite   - set favourited: true via Karakeep API
#   unfavourite - set favourited: false via Karakeep API
#
# Action parameters:
#   tag: "name"  - tag to attach/detach; REQUIRED for tag/untag, invalid for other actions
#
# Per-rule overrides:
#   dryRun: true/false  - override global dry-run for this rule (omit to inherit global)
#   notify: "channel"   - send this rule's summary to a specific notification channel
#
# Notification options:
#   notifyOnError: true  - send notification to default channel on config validation failure
